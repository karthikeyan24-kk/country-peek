<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CountryPeek</title>
    <script>
        // Store the path for GitHub Pages SPA routing
        const l = window.location
        sessionStorage.redirect = l.pathname + l.search + l.hash
        // Redirect to index.html
        l.replace(
            l.pathname.split('/').slice(0, -1).join('/') + '/index.html'
        )
    </script>
</head>
<body>
</body>
</html>
